name: Continuous Fuzz
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: macos-15
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        fuzzer: [imk_menu_fuzzer, cascade_fuzzer]
    steps:
      - uses: actions/checkout@v4

      - name: Install coreutils (gtimeout)
        run: |
          if ! command -v gtimeout >/dev/null 2>&1; then
            brew install coreutils 2>&1 | tail -3 || true
          fi
          which gtimeout || true
          gtimeout --version 2>&1 | head -1 || true

      - name: Check environment
        run: |
          xcodebuild -version
          clang --version
          if echo 'int LLVMFuzzerTestOneInput(const char *d, long s){return 0;}' | clang -fsanitize=fuzzer -x c - -o /dev/null 2>/dev/null; then
            echo "libFuzzer: AVAILABLE"
          else
            echo "libFuzzer: standalone harness fallback"
          fi

      - name: Build fuzzer
        run: |
          cd ${{ matrix.fuzzer }}
          chmod +x build.sh
          ./build.sh

      - name: Run fuzzer (5 hours)
        run: |
          cd ${{ matrix.fuzzer }}
          FUZZER=$(find . -name "fuzz_*" -type f -perm +111 | head -1)
          mkdir -p crashes
          if [ -z "$FUZZER" ]; then echo "no fuzzer found"; exit 0; fi
          MAX_LEN=131072
          [[ "${{ matrix.fuzzer }}" == "cascade_fuzzer" ]] && MAX_LEN=524288
          # Use libFuzzer's own -max_total_time instead of external timeout
          # (libFuzzer accepts time-based exit, no need for `timeout` shell util)
          $FUZZER corpus/ \
            -max_len=$MAX_LEN \
            -timeout=10 \
            -rss_limit_mb=2048 \
            -jobs=3 \
            -workers=3 \
            -max_total_time=18000 \
            -artifact_prefix=crashes/ \
            -print_final_stats=1 \
            || true

      - name: Check for crashes
        if: always()
        run: |
          cd ${{ matrix.fuzzer }}
          if ls crashes/crash-* 1>/dev/null 2>&1; then
            echo "CRASHES FOUND!"
            ls -la crashes/
            for f in crashes/crash-*; do xxd "$f" | head -20; done
          else
            echo "No crashes this run"
          fi

      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crashes-${{ matrix.fuzzer }}-${{ github.run_number }}
          path: ${{ matrix.fuzzer }}/crashes/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload grown corpus
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-${{ matrix.fuzzer }}-${{ github.run_number }}
          path: ${{ matrix.fuzzer }}/corpus/
          retention-days: 14
